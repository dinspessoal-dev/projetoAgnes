<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obras | Agnes Zamai</title>

    <link rel="icon" type="image/png" href="assets/favicon.ico" />
    
    <link rel="stylesheet" href="style.css" />
  </head>

  <script>
    // Carrega header
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
  
        // marca menu ativo automaticamente
        const currentPage = document.body.dataset.page;
        const links = document.querySelectorAll("nav a");
  
        links.forEach(link => {
          if (link.dataset.page === currentPage) {
            link.classList.add("active");
          }
        });
      });
  
    // Carrega footer
    fetch("footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <body data-page="sobre">
    <div id="header"></div>

    <!-- Cabeçalho ajustado para usar o mesmo visual do livros.html -->
    <section class="page-header-img">
      <h1>Biografia Completa</h1>
      <p>Gaúcha, mãe e pedagoga. Descobriu um amor incondicional pela escrita e pretende viver disso um dia. Escreve livros de romance com uma pitada de drama, acreditando que o final feliz é relativo.</p>
    </section>

    <div class="stats-bar">
      <div class="stat-item">
        <strong>+2.8M</strong><span>Páginas Lidas</span>
      </div>
      <div class="stat-item">
        <strong>4.7</strong><span>Avaliação Média</span>
      </div>
      <div class="stat-item"><strong>600+</strong><span>Seguidores</span></div>
    </div>

    <main>
      <section id="livros" class="books-grid">
        <div class="container"></div>
      </section>
    </main>

    <div id="footer"></div>
    <script>
      // Atualiza o ano automaticamente
      document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
